# 06-SQLAlchemyTodo - Alembic 설정 파일
#
# 자세한 설명은 https://alembic.sqlalchemy.org/en/latest/tutorial.html 참고.

[alembic]
# 마이그레이션 스크립트가 들어 있는 폴더
script_location = alembic

# 마이그레이션 파일 이름 패턴
# 예: 20260425_2030-abc123-create_todos_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 타임스탬프를 timezone-aware UTC 로 출력
timezone = UTC

# 자동 생성된 마이그레이션 파일에 사용할 인코딩
output_encoding = utf-8

# DATABASE_URL 은 alembic/env.py 에서 환경 변수에서 읽어 덮어쓴다.
# 여기 비워둬도 동작합니다.
sqlalchemy.url =


# ─────────────────────────────────────────────────────────
# 로깅 설정 — 기본값 그대로 유지
# ─────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
