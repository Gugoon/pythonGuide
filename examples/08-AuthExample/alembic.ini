# Alembic 설정 파일.
# 이 파일은 Alembic이 시작될 때 가장 먼저 읽는다. sqlalchemy.url은 코드에서
# settings.database_url로 덮어쓰므로, 여기서는 자리만 잡아둔다.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = sqlite+aiosqlite:///./auth.db


[post_write_hooks]
# 자동 생성된 마이그레이션 파일에 후처리를 걸고 싶다면 여기에 등록.
# 학습용으로는 비워두면 된다.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
