# Alembic 설정 파일. 실행 시 alembic 명령이 이 파일을 읽는다.
# 주석을 남겨 둔 항목은 기본값을 그대로 쓴다는 뜻이다.

[alembic]
# 마이그레이션 스크립트가 들어가는 폴더.
script_location = alembic

# 새 리비전 파일 이름 형식. 0001_create_todos.py 같은 모양으로 만들기 위해 prefix 를 지정한다.
file_template = %%(rev)s_%%(slug)s

# DB URL 의 기본값. 실제 값은 env.py 가 환경 변수에서 다시 읽어 덮어쓴다.
sqlalchemy.url = sqlite+aiosqlite:///./todo.db

# 마이그레이션 파일을 만들 때 prefix 가 자동 증가하는 형식 대신
# 단순 4자리(0001, 0002, ...) 를 쓰고 싶다면 여기서 지정할 수 있다.
# 본 예제는 첫 리비전을 손으로 0001 로 둔다.

[post_write_hooks]
# (선택) 새 리비전 파일을 만들 때 자동으로 ruff 같은 포매터를 돌리고 싶다면 여기에 적는다.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
