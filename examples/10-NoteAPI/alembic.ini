# Alembic 설정 파일.
# sqlalchemy.url은 alembic/env.py에서 settings.database_url로 덮어쓰므로
# 여기서는 자리만 잡아둔다. .env 한 곳만 수정하면 마이그레이션 대상도 함께 바뀐다.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://note_user:note_pass@localhost:5432/note_api


[post_write_hooks]
# 자동 생성된 마이그레이션 파일에 후처리(예: black)를 걸고 싶다면 여기에.
# 학습용으로는 비워두면 된다.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
